<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ساعة البحور المعيارية - خشان خشان</title>
<style>
/* ميثاق السيادة: استقلال مطلق - Arial - أبعاد وقورة */
:root { --gold:#ffcf4b; --blue:#2e96ff; --red:#ff4757; }
body { margin:0; background:#050505; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; font-family:Arial, sans-serif; }

.stage { position:relative; width:90vw; height:70vh; max-width:850px; }

/* الكائن المستقل (Black Box) */
.black-box {
    position:absolute; width:100%; padding:50px 20px; background:#0d0d0d; border-radius:15px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    opacity:0; visibility:hidden; transition:opacity 1s ease-in-out;
    box-sizing: border-box;
}
.black-box.active { opacity:1; visibility:visible; border:1px solid rgba(255,207,75,0.1); }

.m-name { color:var(--gold); font-size:42px; margin-bottom:35px; font-weight:bold; }

/* تنسيق الأرقام (الكامل والوافر) */
.m-weight { display:flex; flex-direction:row; direction:rtl; font-size:38px; font-weight:bold; gap:10px; }
.n2 { color:var(--blue); position:relative; }
.n3 { color:var(--red); position:relative; }
.u-line { border-bottom: 4px solid var(--blue); padding-bottom: 3px; }

/* تنسيق الجملة البديلة (للبحور الأربعة) */
.m-note { color:white; font-size:24px; text-align:center; line-height:1.6; max-width:90%; }

.footer { position:absolute; bottom:15px; font-size:12px; opacity:0.3; text-align:center; width:100%; }
</style>
</head>
<body>

<div class="stage">

<div id="ID_KAMIL" class="black-box">
    <div class="m-name">الكامل</div>
    <div class="m-weight">
        <span class="n2 u-line">٢</span><span class="n2">٢</span><span class="n3">٣</span>
        <span class="n2 u-line">٢</span><span class="n2">٢</span><span class="n3">٣</span>
        <span class="n2 u-line">٢</span><span class="n2">٢</span><span class="n3">٣</span>
    </div>
</div>

<div id="ID_WAFIR" class="black-box">
    <div class="m-name">الوافر</div>
    <div class="m-weight">
        <span class="n3">٣</span><span class="n2 u-line">٢</span><span class="n2">٢</span>
        <span class="n3">٣</span><span class="n2 u-line">٢</span><span class="n2">٢</span>
        <span class="n3">٣</span><span class="n2">٢</span>
    </div>
</div>

<div id="ID_MUNSARIH" class="black-box">
    <div class="m-name">المنسرح</div>
    <div class="m-note">يراجع الجدول لتعذر تمثيل التوأمين الوتديين</div>
</div>

<div id="ID_KHAFIF" class="black-box">
    <div class="m-name">الخفيف</div>
    <div class="m-note">يراجع الجدول لتعذر تمثيل التوأمين الوتديين</div>
</div>

<div id="ID_MUDARI" class="black-box">
    <div class="m-name">المضارع</div>
    <div class="m-note">يراجع الجدول لتعذر تمثيل التوأمين الوتديين</div>
</div>

<div id="ID_MUJTH" class="black-box">
    <div class="m-name">المجتث</div>
    <div class="m-note">يراجع الجدول لتعذر تمثيل التوأمين الوتديين</div>
</div>

</div>

<div class="footer">العروض الرقمي المعياري - خشان خشان</div>

<script>
(function(){
    const b = ["ID_KAMIL", "ID_WAFIR", "ID_MUNSARIH", "ID_KHAFIF", "ID_MUDARI", "ID_MUJTH"];
    let c = 0;
    function r() {
        b.forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById(b[c]).classList.add('active');
        c = (c + 1) % b.length;
    }
    r(); setInterval(r, 6000); // ٦ ثوانٍ لكل بحر ليتسنى قراءة الجملة
})();
</script>
</body>
</html>
