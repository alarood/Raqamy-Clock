
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساعة البحور المعيارية - خشان خشان</title>
    <style>
        /* ميثاق الإخراج: استقلال مطلق - خط Arial - أرقام عربية */
        :root { --gold: #ffcf4b; --blue: #2e96ff; --red: #ff4757; }
        
        body { 
            background-color: #050505; 
            color: white; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: Arial, Helvetica, sans-serif; /* خط إيريال حصرياً */
            overflow: hidden; 
        }

        .stage { position: relative; width: 95vw; height: 85vh; max-width: 900px; }

        /* كائن مستقل (Black Box) - سيادة كاملة لكل ID */
        .black-box {
            position: absolute;
            width: 100%;
            padding: 60px 20px;
            background: #0d0d0d;
            border: 2px solid rgba(255, 207, 75, 0.1);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            z-index: 1;
            transition: opacity 0.8s ease, transform 0.8s ease;
            visibility: hidden;
            direction: rtl; /* اتجاه اليمين العربي */
        }

        .black-box.active {
            opacity: 1;
            visibility: visible;
            z-index: 100;
            border-color: var(--gold);
            box-shadow: 0 0 50px rgba(255, 207, 75, 0.1);
        }

        .m-name { 
            font-size: clamp(40px, 10vw, 75px); 
            color: var(--gold); 
            font-weight: bold; 
            margin-bottom: 50px; 
        }

        /* حاوية الأرقام: اليمين هو البداية (Row) */
        .m-weight { 
            font-size: clamp(35px, 9vw, 65px); 
            font-weight: bold; 
            display: flex; 
            flex-direction: row; /* لضمان الترتيب من اليمين لليسار */
            direction: rtl; 
            gap: 0.5em; 
            justify-content: center; 
            align-items: baseline; 
            font-family: Arial, sans-serif;
        }

        .n3 { color: var(--red); position: relative; }
        .n2 { color: var(--blue); }

        /* إخراج الـ (٢ ١ ٢) تحت الرقم ٣ بشكل أفقي ومنسق */
        .sub-group {
            position: absolute;
            bottom: -1.2em;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.45em;
            color: var(--red);
            letter-spacing: 5px;
            white-space: nowrap;
            font-weight: bold;
        }

        /* حركات مستقلة لكل كائن */
        @keyframes floating {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
        .active { animation: floating 4s infinite ease-in-out; }

        .footer { position: absolute; bottom: 20px; font-size: 14px; opacity: 0.3; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div class="stage">
    <div id="ID_KAMIL" class="black-box">
        <div class="m-name">الكامل</div>
        <div class="m-weight">
            <span class="n2">٢</span><span class="n2">٢</span><span class="n3">٣</span>
            <span class="n2">٢</span><span class="n2">٢</span><span class="n3">٣</span>
            <span class="n2">٢</span><span class="n2">٢</span><span class="n3">٣</span>
        </div>
    </div>

    <div id="ID_WAFIR" class="black-box">
        <div class="m-name">الوافر</div>
        <div class="m-weight">
            <span class="n3">٣</span><span class="n2">٢</span><span class="n2">٢</span>
            <span class="n3">٣</span><span class="n2">٢</span><span class="n2">٢</span>
            <span class="n3">٣</span><span class="n2">٢</span>
        </div>
    </div>

    <div id="ID_MUNSARIH" class="black-box">
        <div class="m-name">المنسرح</div>
        <div class="m-weight">
            <span class="n3">٣</span><span class="n2">٢</span><span class="n3">٣<span class="sub-group">٢ ١ ٢</span></span>
            <span class="n2">٢</span><span class="n2">٢</span><span class="n2">٢</span><span class="n3">٣</span><span class="n2">٢</span><span class="n2">٢</span>
        </div>
    </div>

    <div id="ID_KHAFIF" class="black-box">
        <div class="m-name">الخفيف</div>
        <div class="m-weight">
            <span class="n2">٢</span><span class="n3">٣</span><span class="n2">٢</span>
            <span class="n3">٣<span class="sub-group">٢ ١ ٢</span></span>
            <span class="n2">٢</span><span class="n2">٢</span><span class="n2">٢</span><span class="n3">٣</span><span class="n2">٢</span>
        </div>
    </div>

    <div id="ID_MUDARI" class="black-box">
        <div class="m-name">المضارع</div>
        <div class="m-weight">
            <span class="n2">٢</span><span class="n3">٣<span class="sub-group">٢ ١ ٢</span></span>
            <span class="n2">٢</span><span class="n2">٢</span><span class="n2">٢</span><span class="n3">٣</span>
        </div>
    </div>

    <div id="ID_MUJTH" class="black-box">
        <div class="m-name">المجتث</div>
        <div class="m-weight">
            <span class="n2">٢</span><span class="n3">٣</span><span class="n2">٢</span>
            <span class="n3">٣<span class="sub-group">٢ ١ ٢</span></span>
            <span class="n2">٢</span><span class="n2">٢</span>
        </div>
    </div>
</div>

<div class="footer">العروض الرقمي المعياري - خشان خشان</div>

<script>
    /* نظام الإدارة المستقلة: كل كائن يعمل في فضاء مغلق */
    (function(){
        const ids = ["ID_KAMIL", "ID_WAFIR", "ID_MUNSARIH", "ID_KHAFIF", "ID_MUDARI", "ID_MUJTH"];
        let current = 0;
        
        function rotate() {
            // تحديث حالة كل ID بشكل مستقل دون مشاركة متغيرات خارجية
            ids.forEach((id, index) => {
                const el = document.getElementById(id);
                if (index === current) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
            current = (current + 1) % ids.length;
        }

        setInterval(rotate, 5000);
        window.onload = rotate;
    })();
</script>

</body>
</html>
