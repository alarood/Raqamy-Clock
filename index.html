<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساعة البحور المعيارية - خشان خشان</title>
    <style>
        /* مرحلة الهندسة والإخراج - نظام الكائنات المستقلة */
        :root { --gold: #ffcf4b; --blue: #2e96ff; --red: #ff4757; }
        body { background-color: #050505; color: white; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        
        .stage { position: relative; width: 90vw; height: 80vh; max-width: 800px; display: flex; justify-content: center; align-items: center; perspective: 1200px; }

        /* الصندوق الأسود المستقل (Black Box) - استجابة للأبعاد */
        .meter-box {
            position: absolute;
            width: 95%; /* مستجيب لعرض الشاشة */
            height: auto;
            min-height: 200px;
            padding: 20px;
            background: linear-gradient(145deg, #0d0d0d, #151515);
            border: 2px solid rgba(255, 207, 75, 0.1);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            z-index: 1;
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
            transform: scale(0.9);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            visibility: hidden;
        }

        /* حالة الظهور (Active) - لا يوجد تقدم أو تأخر */
        .meter-box.active {
            opacity: 1;
            visibility: visible;
            z-index: 100;
            transform: scale(1);
            border-color: var(--gold);
            box-shadow: 0 0 40px rgba(255, 207, 75, 0.05);
        }

        /* تنسيق الخطوط المستجيب للأبعاد */
        .m-name { font-size: 8vw; color: var(--gold); font-weight: 900; margin-bottom: 20px; }
        .m-weight { font-size: 6vw; font-weight: bold; display: flex; gap: 3vw; direction: ltr; flex-wrap: wrap; justify-content: center; align-items: baseline; }

        @media (min-width: 768px) {
            .m-name { font-size: 60px; }
            .m-weight { font-size: 50px; gap: 20px; }
        }

        .n3 { color: var(--red); position: relative; }
        .n2 { color: var(--blue); }
        .hababy { text-decoration: underline; text-decoration-thickness: 5px; text-underline-offset: 10px; }
        
        /* إخراج الـ ٢ ١ ٢ تحت الـ ٣ المعينة */
        .special-3::after { 
            content: "٢ ١ ٢"; position: absolute; bottom: -40px; left: 50%; 
            transform: translateX(-50%); font-size: 0.4em; color: var(--red); 
            letter-spacing: 2px; font-weight: bold; 
        }

        .footer { position: absolute; bottom: 20px; font-size: 12px; opacity: 0.2; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div class="stage" id="mainStage">
    <div id="BOX_1" class="meter-box"><div class="m-name">الطويل</div><div class="m-weight"><span class="n3">3</span> <span class="n2">2</span> <span class="n3">3</span> <span class="n2">2</span> <span class="n2">2</span> <span class="n3">3</span> <span class="n2">2</span> <span class="n3">3</span> <span class="n2">2</span> <span class="n2">2</span></div></div>
    <div id="BOX_2" class="meter-box"><div class="m-name">الوافر</div><div class="m-weight"><span class="n3">3</span> <span class="n2 hababy">2</span> <span class="n2">2</span> <span class="n3">3</span> <span class="n2 hababy">2</span> <span class="n2">2</span> <span class="n3">3</span> <span class="n2">2</span></div></div>
    <div id="BOX_3" class="meter-box"><div class="m-name">الكامل</div><div class="m-weight"><span class="n2 hababy">2</span> <span class="n2">2</span> <span class="n3">3</span> <span class="n2 hababy">2</span> <span class="n2">2</span> <span class="n3">3</span> <span class="n2 hababy">2</span> <span class="n2">2</span> <span class="n3">3</span></div></div>
    <div id="BOX_4" class="meter-box"><div class="m-name">المنسرح</div><div class="m-weight"><span class="n3">3</span> <span class="n2">2</span> <span class="n3 hababy special-3">3</span> <span class="n2">2</span> <span class="n2">2</span> <span class="n2">2</span> <span class="n3">3</span> <span class="n2">2</span> <span class="n2">2</span></div></div>
    <div id="BOX_5" class="meter-box"><div class="m-name">الخفيف</div><div class="m-weight"><span class="n2">2</span> <span class="n3">3</span> <span class="n2">2</span> <span class="n3 hababy special-3">3</span> <span class="n2">2</span> <span class="n2">2</span> <span class="n2">2</span> <span class="n3">3</span> <span class="n2">2</span></div></div>
    <div id="BOX_6" class="meter-box"><div class="m-name">المضارع</div><div class="m-weight"><span class="n2">2</span> <span class="n3 hababy special-3">3</span> <span class="n2">2</span> <span class="n2">2</span> <span class="n2">2</span> <span class="n3">3</span></div></div>
    <div id="BOX_7" class="meter-box"><div class="m-name">المجتث</div><div class="m-weight"><span class="n2">2</span> <span class="n3">3</span> <span class="n2">2</span> <span class="n3 hababy special-3">3</span> <span class="n2">2</span> <span class="n2">2</span></div></div>
</div>

<div class="footer">العروض الرقمي - الهندسة والإخراج المعياري - خشان خشان</div>

<script>
    // هندسة العرض المستقل
    const boxes = document.querySelectorAll('.meter-box');
    let current = 0;

    function runRotation() {
        boxes.forEach(box => box.classList.remove('active'));
        boxes[current].classList.add('active');
        current = (current + 1) % boxes.length;
    }

    // الانتقال كل 4.5 ثانية (بدون حركة خلفية)
    setInterval(runRotation, 4500);
    window.onload = runRotation;
</script>
</body>
</html>
