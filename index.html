<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض مستقل</title>

<style>
:root { --gold:#ffcf4b; --blue:#2e96ff; --red:#ff4757; }

body{
    margin:0;
    background:#050505;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial;
}

.stage{
    position:relative;
    width:95vw;
    height:85vh;
}

/* عنصر مستقل */
.black-box{
    position:absolute;
    width:100%;
    padding:60px 20px;
    background:#0d0d0d;
    border-radius:25px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    opacity:0;
    transform:scale(0.9);
    transition:all .8s ease;
}

/* تفعيل مستقل */
.black-box.active{
    opacity:1;
    transform:scale(1);
    box-shadow:0 0 40px rgba(255,207,75,.25);
}

.m-name{
    color:var(--gold);
    font-size:60px;
    margin-bottom:40px;
}

.m-weight{
    display:flex;
    flex-direction:row-reverse;
    gap:12px;
    font-size:55px;
}

.n2{color:var(--blue);}
.n3{color:var(--red); position:relative;}

/* عنصر فرعي مستقل */
.sub-group{
    position:absolute;
    bottom:-22px;
    left:50%;
    transform:translateX(-50%);
    font-size:18px;
    color:var(--red);
}

/* خطوط التمييز (مستقلة لكل ID) */
#ID_KAMIL .m-weight span:nth-child(3)::after,
#ID_WAFIR .m-weight span:nth-child(3)::after{
    content:"";
    position:absolute;
    bottom:-8px;
    left:0;
    right:0;
    height:3px;
    background:var(--red);
}

/* حركات مستقلة */
@keyframes floatBox{
    0%{transform:translateY(20px) scale(.9);}
    50%{transform:translateY(0) scale(1);}
    100%{transform:translateY(20px) scale(.9);}
}

#ID_KAMIL.active{animation:floatBox 6s infinite;}
#ID_WAFIR.active{animation:floatBox 7s infinite;}
#ID_MUNSARIH.active{animation:floatBox 8s infinite;}
#ID_KHAFIF.active{animation:floatBox 6.5s infinite;}
#ID_MUDARI.active{animation:floatBox 7.5s infinite;}
#ID_MUJTH.active{animation:floatBox 6.8s infinite;}

</style>
</head>

<body>

<div class="stage">

<div id="ID_KAMIL" class="black-box">
<div class="m-name">الكامل</div>
<div class="m-weight">
<span class="n2">٢</span><span class="n2">٢</span><span class="n3">٣</span>
<span class="n2">٢</span><span class="n2">٢</span><span class="n3">٣</span>
<span class="n2">٢</span><span class="n2">٢</span><span class="n3">٣</span>
</div>
</div>

<div id="ID_WAFIR" class="black-box">
<div class="m-name">الوافر</div>
<div class="m-weight">
<span class="n3">٣</span><span class="n2">٢</span><span class="n2">٢</span>
<span class="n3">٣</span><span class="n2">٢</span><span class="n2">٢</span>
<span class="n3">٣</span><span class="n2">٢</span>
</div>
</div>

<div id="ID_MUNSARIH" class="black-box">
<div class="m-name">المنسرح</div>
<div class="m-weight">
<span class="n3">٣</span><span class="n2">٢</span><span class="n3">٣<span class="sub-group">٢ ١ ٢</span></span>
<span class="n2">٢</span><span class="n2">٢</span><span class="n2">٢</span><span class="n3">٣</span><span class="n2">٢</span><span class="n2">٢</span>
</div>
</div>

<div id="ID_KHAFIF" class="black-box">
<div class="m-name">الخفيف</div>
<div class="m-weight">
<span class="n2">٢</span><span class="n3">٣</span><span class="n2">٢</span>
<span class="n3">٣<span class="sub-group">٢ ١ ٢</span></span>
<span class="n2">٢</span><span class="n2">٢</span><span class="n2">٢</span><span class="n3">٣</span><span class="n2">٢</span>
</div>
</div>

<div id="ID_MUDARI" class="black-box">
<div class="m-name">المضارع</div>
<div class="m-weight">
<span class="n2">٢</span><span class="n3">٣<span class="sub-group">٢ ١ ٢</span></span>
<span class="n2">٢</span><span class="n2">٢</span><span class="n2">٢</span><span class="n3">٣</span>
</div>
</div>

<div id="ID_MUJTH" class="black-box">
<div class="m-name">المجتث</div>
<div class="m-weight">
<span class="n2">٢</span><span class="n3">٣</span><span class="n2">٢</span>
<span class="n3">٣<span class="sub-group">٢ ١ ٢</span></span>
<span class="n2">٢</span><span class="n2">٢</span>
</div>
</div>

</div>

<script>
/* كل عنصر يعمل بشكل مستقل تماماً */

(function(){
    let el=document.getElementById("ID_KAMIL");
    let state=false;
    setInterval(()=>{state=!state; el.classList.toggle("active",state)},5000);
})();

(function(){
    let el=document.getElementById("ID_WAFIR");
    let state=false;
    setInterval(()=>{state=!state; el.classList.toggle("active",state)},6000);
})();

(function(){
    let el=document.getElementById("ID_MUNSARIH");
    let state=false;
    setInterval(()=>{state=!state; el.classList.toggle("active",state)},7000);
})();

(function(){
    let el=document.getElementById("ID_KHAFIF");
    let state=false;
    setInterval(()=>{state=!state; el.classList.toggle("active",state)},8000);
})();

(function(){
    let el=document.getElementById("ID_MUDARI");
    let state=false;
    setInterval(()=>{state=!state; el.classList.toggle("active",state)},9000);
})();

(function(){
    let el=document.getElementById("ID_MUJTH");
    let state=false;
    setInterval(()=>{state=!state; el.classList.toggle("active",state)},10000);
})();
</script>

</body>
</html>
