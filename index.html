<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساعة البحور المعيارية - خشان خشان</title>
    <style>
        /* ميثاق الإخراج البصري: استقلال مطلق - خط Arial - أرقام عربية (زخارف) */
        :root { --gold: #ffcf4b; --blue: #2e96ff; --red: #ff4757; }
        
        body { 
            background-color: #050505; 
            color: white; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: Arial, Helvetica, sans-serif; /* خط إيريال حصرياً */
            overflow: hidden; 
        }

        .stage { 
            position: relative; 
            width: 95vw; 
            height: 85vh; 
            max-width: 900px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* كائن مستقل (Black Box) - لا تداخل ولا عبث */
        .black-box {
            position: absolute;
            width: 100%;
            padding: 60px 20px;
            background: #0d0d0d;
            border: 2px solid rgba(255, 207, 75, 0.1);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            z-index: 1;
            transition: opacity 0.8s ease-in-out;
            visibility: hidden;
            direction: rtl; /* الاتجاه من اليمين لليسار */
        }

        .black-box.active {
            opacity: 1;
            visibility: visible;
            z-index: 100;
            border-color: var(--gold);
        }

        .m-name { 
            font-size: clamp(40px, 10vw, 75px); 
            color: var(--gold); 
            font-weight: bold; 
            margin-bottom: 50px; 
        }

        /* حاوية الأرقام المعيارية - اليمين هو البداية */
        .m-weight { 
            font-size: clamp(35px, 9vw, 65px); 
            font-weight: bold; 
            display: flex; 
            flex-direction: row;
            direction: rtl; 
            gap: 0.6em; 
            justify-content: center; 
            align-items: baseline; 
        }

        .n3 { color: var(--red); position: relative; }
        .n2 { color: var(--blue); }

        /* إخراج (٢ ١ ٢) تحت الرقم ٣ بشكل أفقي منسق (Suspec Circle) */
        .special-3 {
            border-bottom: 5px solid var(--red);
            padding-bottom: 5px;
        }

        .special-3::after { 
            content: "٢ ١ ٢"; position: absolute; bottom: -1.3em; left: 50%; 
            transform: translateX(-50%); font-size: 0.45em; color: var(--red); 
            letter-spacing: 6px; white-space: nowrap; font-weight: bold; 
        }

        .footer { position: absolute; bottom: 20px; font-size: 14px; opacity: 0.3; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div class="stage" id="mainStage">
    <div id="ID_KAMIL" class="black-box">
        <div class="m-name">الكامل</div>
        <div class="m-weight">
            <span class="n2">٢</span> <span class="n2">٢</span> <span class="n3">٣</span>
            <span class="n2">٢</span> <span class="n2">٢</span> <span class="n3">٣</span>
            <span class="n2">٢</span> <span class="n2">٢</span> <span class="n3">٣</span>
        </div>
    </div>

    <div id="ID_WAFIR" class="black-box">
        <div class="m-name">الوافر</div>
        <div class="m-weight">
            <span class="n3">٣</span> <span class="n2">٢</span> <span class="n2">٢</span>
            <span class="n3">٣</span> <span class="n2">٢</span> <span class="n2">٢</span>
            <span class="n3">٣</span> <span class="n2">٢</span>
        </div>
    </div>

    <div id="ID_MUNSARIH" class="black-box">
        <div class="m-name">المنسرح</div>
        <div class="m-weight">
            <span class="n3">٣</span> <span class="n2">٢</span> <span class="n3 special-3">٣</span> 
            <span class="n2">٢</span> <span class="n2">٢</span> <span class="n2">٢</span> <span class="n3">٣</span> <span class="n2">٢</span> <span class="n2">٢</span>
        </div>
    </div>

    <div id="ID_KHAFIF" class="black-box">
        <div class="m-name">الخفيف</div>
        <div class="m-weight">
            <span class="n2">٢</span> <span class="n3">٣</span> <span class="n2">٢</span> 
            <span class="n3 special-3">٣</span> <span class="n2">٢</span> <span class="n2">٢</span> <span class="n2">٢</span> <span class="n3">٣</span> <span class="n2">٢</span>
        </div>
    </div>

    <div id="ID_MUDARI" class="black-box">
        <div class="m-name">المضارع</div>
        <div class="m-weight">
            <span class="n2">٢</span> <span class="n3 special-3">٣</span> <span class="n2">٢</span> <span class="n2">٢</span> <span class="n2">٢</span> <span class="n3">٣</span>
        </div>
    </div>

    <div id="ID_MUJTH" class="black-box">
        <div class="m-name">المجتث</div>
        <div class="m-weight">
            <span class="n2">٢</span> <span class="n3">٣</span> <span class="n2">٢</span> <span class="n3 special-3">٣</span> <span class="n2">٢</span> <span class="n2">٢</span>
        </div>
    </div>
</div>

<div class="footer">العروض الرقمي المعياري - خشان خشان</div>

<script>
    /* الإدارة المستقلة للكائنات عبر IDs فريدة - Self-Contained */
    const blackBoxes = [
        document.getElementById('ID_KAMIL'),
        document.getElementById('ID_WAFIR'),
        document.getElementById('ID_MUNSARIH'),
        document.getElementById('ID_KHAFIF'),
        document.getElementById('ID_MUDARI'),
        document.getElementById('ID_MUJTH')
    ];

    let current = 0;
    function rotateOutput() {
        // تحديث حالة كل صندوق بشكل مستقل تماماً عبر ID الخاص به
        blackBoxes.forEach((box, i) => {
            if (i === current) {
                box.classList.add('active');
            } else {
                box.classList.remove('active');
            }
        });
        current = (current + 1) % blackBoxes.length;
    }

    // إخراج جمالي بتوقيت ثابت 5 ثوانٍ
    setInterval(rotateOutput, 5000);
    window.onload = rotateOutput;
</script>
</body>
</html>
